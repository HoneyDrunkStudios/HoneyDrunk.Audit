# SonarQube Cloud project configuration for HoneyDrunk.Audit.
# Project imported via the SonarQube Cloud GitHub App; quality gate runs in
# job-sonarcloud.yml (HoneyDrunk.Actions) on every pull request to main.
# Post-merge analysis on `push` to `main` is deferred (cost discipline per
# ADR-0011 D11 + D6); the upstream job-sonarcloud.yml supports both event
# types if push-time analysis is ever wanted.
#
# This file lives at the repo root next to HoneyDrunk.Audit.slnx — Audit's
# pr.yml runs the reusable workflow with working-directory: '.' so this is
# where the scanner discovers project configuration.

sonar.organization=honeydrunkstudios
sonar.projectKey=honeydrunkstudios_HoneyDrunk.Audit
sonar.projectName=HoneyDrunk.Audit

# Sources / tests — repo uses the src/ + tests/ split
sonar.sources=src
sonar.tests=tests

# Coverage (consumed by job-sonarcloud.yml after Cobertura → OpenCover conversion)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Exclusions — generated code and build outputs
sonar.exclusions=**/obj/**,**/bin/**,**/*.Designer.cs

# No coverage exclusions — HoneyDrunk.Audit.Abstractions contains executable
# logic (e.g., AuditEntry.NormalizeForAppend), not interface-only stubs. Let
# Sonar measure it. If specific types should be excluded, use
# [ExcludeFromCodeCoverage] attributes in code rather than path-based excludes.

