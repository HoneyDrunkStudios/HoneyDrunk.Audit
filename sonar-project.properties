# SonarQube Cloud project configuration for HoneyDrunk.Audit.
# Project imported via the SonarQube Cloud GitHub App; quality gate runs in
# job-sonarcloud.yml (HoneyDrunk.Actions) on every PR and push to main.
#
# This file lives at the repo root next to HoneyDrunk.Audit.slnx — Audit's
# pr.yml runs the reusable workflow with working-directory: '.' so this is
# where the scanner discovers project configuration.

sonar.organization=honeydrunkstudios
sonar.projectKey=honeydrunkstudios_HoneyDrunk.Audit
sonar.projectName=HoneyDrunk.Audit

# Sources / tests — repo uses the src/ + tests/ split
sonar.sources=src
sonar.tests=tests

# Coverage (consumed by job-sonarcloud.yml after job-build-and-test.yml uploads
# the coverlet OpenCover report)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Exclusions — generated code and build outputs
sonar.exclusions=**/obj/**,**/bin/**,**/*.Designer.cs

# Coverage exclusions — Abstractions packages contain interfaces only
sonar.coverage.exclusions=**/src/HoneyDrunk.Audit.Abstractions/**

# New Code definition — inherits from organization default (30 days)
